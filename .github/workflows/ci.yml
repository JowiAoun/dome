name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shell:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: bash syntax
        run: |
          for f in bootstrap.sh install.sh setup.sh system/*.sh duo/bin/duo duo/helper/zenduo-helper; do
            bash -n "$f"
          done
      - name: shellcheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck -x system/*.sh install.sh setup.sh bootstrap.sh duo/bin/duo duo/helper/zenduo-helper
      - name: setup.sh non-interactive smoke test
        run: |
          ./setup.sh --defaults zenbook-duo
          grep -q 'cloud = false;' user-config.nix
          grep -q 'apps = true;' user-config.nix
          grep -q 'hostProfile = "zenbook-duo";' user-config.nix
          # The system-layer switches must come out as real booleans: cfg_get
          # returns empty on a first run, so a missing backfill would emit
          # `dockerEngine = ;` and every later Nix eval would fail to parse.
          grep -q 'dockerEngine = true;' user-config.nix
          grep -q 'dockerDesktop = false;' user-config.nix
          grep -q 'claudeDesktop = true;' user-config.nix
          # appsSkip must be a real (here empty) Nix list, never `appsSkip = ;`
          grep -q 'appsSkip = \[ \];' user-config.nix
          # An empty hostName means "leave the machine name alone" — a first run
          # must never invent one and rename someone's computer.
          grep -q 'hostName = "";' user-config.nix
          rm user-config.nix

      - name: apps already installed elsewhere are detected and skipped
        run: |
          mkdir -p ~/.local/share/flatpak/exports/share/applications
          touch ~/.local/share/flatpak/exports/share/applications/com.brave.Browser.desktop
          ./setup.sh --detect-apps | grep -qx brave
          ./setup.sh --defaults generic
          grep -q 'appsSkip = \[ "brave" \];' user-config.nix
          rm -f ~/.local/share/flatpak/exports/share/applications/com.brave.Browser.desktop
          if ./setup.sh --detect-apps | grep -qx brave; then
            echo "brave still detected after removing the foreign copy" >&2
            exit 1
          fi
          # The audit is read-only and must survive a machine with no GNOME,
          # no Nix profile and no colliding entries.
          ./setup.sh --audit-apps
          rm user-config.nix
      - name: python bytecompile
        run: python3 -m py_compile duo/lib/*.py

  hygiene:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks scans the commit history, not just HEAD
      - name: personal config must never be tracked
        run: |
          if git ls-files | grep -qx user-config.nix; then
            echo "user-config.nix is tracked — it is personal and must stay git-ignored" >&2
            exit 1
          fi
      - name: secret scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  flake-eval:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
      - name: evaluate all home configurations
        run: |
          nix eval .#homeConfigurations.generic.activationPackage.drvPath
          nix eval .#homeConfigurations.zenbook-duo.activationPackage.drvPath
      - name: evaluate with every module enabled
        # The evals above use the template (python/node/java = false), so those
        # module bodies are never type-checked. Enable them all and evaluate via
        # path:. (which includes the untracked user-config.nix, like install.sh)
        # so a broken attr in python/node/java fails CI instead of a user's switch.
        run: |
          cp user-config.template.nix user-config.nix
          sed -i 's/python = false;/python = true;/;s/node = false;/node = true;/;s/java = false;/java = true;/;s/apps = false;/apps = true;/' user-config.nix
          nix eval 'path:.#homeConfigurations.generic.activationPackage.drvPath'
          rm -f user-config.nix
